services:

  ai-health-bot:
    build: .
    environment:
      - ENV=development
    restart: always
    depends_on:
    - ai-health-bot-db

  ai-health-bot-db:
    image: mysql:latest
    container_name: ai-health-bot-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_health_bot_db
    ports:
      - "3307:3306"
  
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - ai-health-bot